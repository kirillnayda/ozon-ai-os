name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test-and-release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python scripts/check.py
      - name: Publish immutable GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes --title "Ozon AI OS $GITHUB_REF_NAME"
